name: Keep Vercel Serverless Function Warm

on:
  schedule:
    # Runs every 10 minutes, 24/7
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel Deployment SSR
        run: |
          echo "Pinging Vercel Serverless Function to prevent cold start..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://kaif-erp.vercel.app/)
          echo "Vercel responded with status code: $STATUS_CODE"
          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "Successfully kept server warm!"
          else
            echo "Warning: Received unexpected status code."
          fi
